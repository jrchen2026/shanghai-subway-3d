<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>上海轨道交通 · 全网 3D</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #060a13;
    --panel: rgba(10, 16, 28, 0.72);
    --panel-line: rgba(140, 170, 210, 0.16);
    --ink: #e9eef6;
    --muted: #8da0bc;
    --faint: #55677f;
    --accent: #e3002a;
    font-family: Bahnschrift, "DIN Alternate", "Helvetica Neue", "Segoe UI",
      "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", sans-serif;
  }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--ink); overflow: hidden; }
  #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block;
    cursor: grab; touch-action: none; }
  #scene.dragging { cursor: grabbing; }

  .hud { position: fixed; z-index: 2; }
  .panel {
    background: var(--panel); border: 1px solid var(--panel-line);
    border-radius: 10px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }

  #title { top: 20px; left: 22px; pointer-events: none; max-width: min(72vw, 420px); }
  #title .eyebrow {
    font-size: 11px; letter-spacing: 0.32em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 6px;
  }
  #title h1 {
    margin: 0; font-size: clamp(22px, 4.2vw, 34px); font-weight: 700;
    letter-spacing: 0.04em; line-height: 1.15; text-wrap: balance;
  }
  #title h1 .dot { color: var(--accent); }
  #title .sub { margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.6; }
  #stats {
    margin-top: 10px; font-size: 12px; color: var(--faint);
    font-variant-numeric: tabular-nums; letter-spacing: 0.06em;
  }

  #controls { top: 20px; right: 22px; display: flex; flex-direction: column;
    gap: 10px; align-items: flex-end; }
  #controls .row { display: flex; gap: 8px; align-items: center; padding: 8px 12px; }
  button.tgl {
    font: inherit; font-size: 12px; letter-spacing: 0.08em; color: var(--muted);
    background: var(--panel); border: 1px solid var(--panel-line); border-radius: 10px;
    padding: 8px 14px; cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  button.tgl:hover { color: var(--ink); border-color: rgba(140, 170, 210, 0.35); }
  button.tgl[aria-pressed="true"] { color: var(--ink); border-color: rgba(233, 238, 246, 0.5); }
  button.tgl:focus-visible, .chip:focus-visible {
    outline: 2px solid #e9eef6; outline-offset: 2px;
  }
  #speedRow label { font-size: 11px; letter-spacing: 0.14em; color: var(--muted); }
  #speed { width: 110px; accent-color: #8da0bc; }

  #legend {
    bottom: 14px; left: 50%; transform: translateX(-50%);
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 5px; padding: 6px 10px; max-width: 94vw;
    transition: opacity 0.25s;
  }
  #legend.faded { opacity: 0.12; }
  #selName {
    font-size: 12px; color: var(--muted); letter-spacing: 0.06em;
    padding-right: 7px; border-right: 1px solid var(--panel-line); margin-right: 3px;
    white-space: nowrap;
  }
  .chip {
    display: block; cursor: pointer; border: 1px solid transparent;
    background: none; padding: 2px; border-radius: 8px; font: inherit;
  }
  .chip:hover { border-color: rgba(233, 238, 246, 0.4); }
  .chip[aria-pressed="true"] { border-color: rgba(233, 238, 246, 0.85); }
  .chip .badge {
    width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center;
    font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .chip.dimmed { opacity: 0.32; }

  #hint {
    bottom: 18px; right: 22px; font-size: 11px; color: var(--faint);
    letter-spacing: 0.08em; pointer-events: none; text-align: right; line-height: 1.7;
  }

  #tip {
    position: fixed; z-index: 3; pointer-events: none; display: none;
    background: rgba(8, 13, 24, 0.92); border: 1px solid var(--panel-line);
    border-radius: 8px; padding: 6px 10px; font-size: 12px; line-height: 1.5;
    max-width: 240px;
  }
  #tip .tname { font-weight: 700; letter-spacing: 0.04em; }
  #tip .tlines { color: var(--muted); font-size: 11px; margin-top: 2px; }

  #routeBox { top: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; align-items: center; padding: 7px 9px; }
  #routeBox input { font: inherit; font-size: 12px; color: var(--ink);
    background: rgba(233,238,246,0.05); border: 1px solid var(--panel-line);
    border-radius: 7px; padding: 6px 9px; width: 104px; }
  #routeBox input::placeholder { color: var(--faint); }
  #routeBox input:focus { outline: none; border-color: rgba(233,238,246,0.5); }
  .rbtn { font: inherit; font-size: 13px; color: var(--muted); background: none;
    border: 1px solid transparent; border-radius: 7px; padding: 5px 7px; cursor: pointer; }
  .rbtn:hover { color: var(--ink); border-color: rgba(140,170,210,0.35); }

  #routeCard { top: 210px; left: 22px; width: 240px; padding: 12px 14px;
    font-size: 12px; line-height: 1.6; max-height: calc(100vh - 330px); overflow-y: auto; }
  #routeCard .rc-head { font-weight: 700; font-size: 13px; letter-spacing: 0.04em; margin-bottom: 8px; }
  #routeCard .rc-leg { display: flex; gap: 7px; align-items: baseline; margin: 4px 0; }
  #routeCard .rc-leg .badge { flex: none; width: 18px; height: 18px; border-radius: 5px;
    display: inline-grid; place-items: center; font-size: 11px; font-weight: 700;
    transform: translateY(3px); }
  #routeCard .rc-tr { color: var(--muted); font-size: 11px; margin: 2px 0 2px 25px; }
  #routeCard .rc-foot { margin-top: 9px; padding-top: 8px; border-top: 1px solid var(--panel-line);
    color: var(--muted); font-variant-numeric: tabular-nums; }

  @media (max-width: 960px) {
    #routeBox { top: auto; bottom: 58px; }
  }
  @media (max-width: 640px) {
    #title { left: 14px; top: 14px; }
    #controls { right: 14px; top: 14px; }
    #hint { display: none; }
    #legend { bottom: 12px; }
    #routeCard { display: none; }
  }
</style>
</head>

<canvas id="scene" aria-label="上海轨道交通全网三维动态图"></canvas>

<div class="hud" id="title">
  <div class="eyebrow">Shanghai Metro &middot; Night Network</div>
  <h1>上海轨道交通<span class="dot"> · </span>全网</h1>
  <div class="sub">流动的光点是运行中的列车。拖拽旋转视角，滚轮或双指缩放，点击下方线路徽章可单独点亮一条线。</div>
  <div id="stats"></div>
</div>

<div class="hud" id="controls">
  <button class="tgl" id="rotBtn" aria-pressed="false">环绕 关</button>
  <div class="row panel" id="speedRow">
    <label for="speed">车速</label>
    <input type="range" id="speed" min="0" max="3" step="0.1" value="1">
  </div>
</div>

<div class="hud panel" id="routeBox" role="search" aria-label="换乘查询">
  <input id="stA" list="stList" placeholder="出发站" autocomplete="off" aria-label="出发站">
  <button class="rbtn" id="swapBtn" title="交换起终点" aria-label="交换起终点">⇄</button>
  <input id="stB" list="stList" placeholder="到达站" autocomplete="off" aria-label="到达站">
  <button class="rbtn" id="routeClear" title="清除路径" aria-label="清除路径">✕</button>
</div>
<datalist id="stList"></datalist>
<div class="hud panel" id="routeCard" hidden></div>

<div class="hud panel" id="legend" role="group" aria-label="线路筛选"><span id="selName">全网</span></div>

<div class="hud" id="hint">拖拽 旋转 &middot; Shift+拖拽 平移<br>滚轮 / 双指 缩放 &middot; 点击车站 设起终点</div>

<div id="tip"><div class="tname"></div><div class="tlines"></div></div>

const lines = DATA.map((L, li) => {
  const ring = L.name === "4号线";
  const raw = L.st.map(s => toKm(s[0], s[1]));
  // 4号线与3号线共线段错开一点，避免完全重叠
  const off = ring ? 0.14 : 0;
  const pts = raw.map(p => [p[0] + off, p[1] - off * 0.4]);
  if (ring) pts.push(pts[0]);
  const cum = [0];
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i][0] - pts[i-1][0], dy = pts[i][1] - pts[i-1][1];
    cum.push(cum[i-1] + Math.hypot(dx, dy));
  }
  const num = L.name.endsWith("号线") ? L.name.replace("号线", "") : L.name[0];
  return { name: L.name, num, color: L.color,
    st: L.st, pts, cum, len: cum[cum.length - 1], ring };
});

function pointAt(L, s) {
  s = Math.max(0, Math.min(L.len, s));
  let lo = 0, hi = L.cum.length - 1;
  while (lo + 1 < hi) { const m = (lo + hi) >> 1; (L.cum[m] <= s) ? lo = m : hi = m; }
  const t = (s - L.cum[lo]) / (L.cum[hi] - L.cum[lo] || 1);
  const a = L.pts[lo], b = L.pts[hi];
  return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
}

// —— 相机 ——
const cam = { yaw: -0.5, pitch: 0.92, dist: 84, tx: 2, ty: -6 };
let autoRotate = false;
let selected = -1;

const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
}
addEventListener("resize", resize); resize();

let PR = { cy: 1, sy: 0, cp: 1, sp: 0, F: 900 };
function updateProj() {
  PR.cy = Math.cos(cam.yaw); PR.sy = Math.sin(cam.yaw);
  PR.cp = Math.cos(cam.pitch); PR.sp = Math.sin(cam.pitch);
  PR.F = Math.min(W, H) * 1.5;
}
// 世界(km) → 屏幕(px)。返回 [x, y, 透视缩放]
function proj(x, y, z) {
  const px = x - cam.tx, py = y - cam.ty;
  const rx = px * PR.cy - py * PR.sy;
  const ry = px * PR.sy + py * PR.cy;
  const vY = ry * PR.sp + z * PR.cp;
  const vZ = Math.max(2, ry * PR.cp - z * PR.sp + cam.dist);
  const s = PR.F / vZ;
  return [W / 2 + rx * s, H / 2 - vY * s, s];
}

// —— 交互 ——
const pointers = new Map();
let lastPinch = 0, hoverPt = null, downAt = null;
canvas.addEventListener("pointerdown", e => {
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, shift: e.shiftKey });
  downAt = pointers.size === 1 ? { x: e.clientX, y: e.clientY } : null;
  canvas.classList.add("dragging");
  document.getElementById("legend").classList.add("faded");
});
canvas.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) { hoverPt = { x: e.clientX, y: e.clientY }; return; }
  const p = pointers.get(e.pointerId);
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  p.x = e.clientX; p.y = e.clientY;
  if (pointers.size === 1) {
    if (Math.abs(dx) + Math.abs(dy) > 0) camGoal = null;
    if (e.shiftKey || p.shift) { // 平移
      const k = cam.dist / PR.F;
      const mx = dx * k, my = -dy * k / Math.max(0.25, PR.sp);
      cam.tx -= mx * PR.cy + my * PR.sy;
      cam.ty -= -mx * PR.sy + my * PR.cy;
    } else {
      cam.yaw += dx * 0.005;
      cam.pitch = Math.max(0.28, Math.min(1.45, cam.pitch + dy * 0.004));
    }
  } else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    if (lastPinch) cam.dist = Math.max(18, Math.min(180, cam.dist * lastPinch / d));
    lastPinch = d;
  }
  hoverPt = null; hideTip();
});
function endPointer(e) {
  pointers.delete(e.pointerId); lastPinch = 0;
  if (!pointers.size) {
    canvas.classList.remove("dragging");
    document.getElementById("legend").classList.remove("faded");
  }
}
canvas.addEventListener("pointerup", e => { pickStation(e); endPointer(e); });
canvas.addEventListener("pointercancel", e => { downAt = null; endPointer(e); });
canvas.addEventListener("pointerleave", () => { hoverPt = null; hideTip(); });
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  camGoal = null;
  cam.dist = Math.max(18, Math.min(180, cam.dist * Math.exp(e.deltaY * 0.0012)));
}, { passive: false });

// 点击（非拖拽）选起终点
function pickStation(e) {
  if (!downAt) return;
  const moved = Math.hypot(e.clientX - downAt.x, e.clientY - downAt.y);
  downAt = null;
  if (moved > 6) return;
  let best = null, bd = 196; // 14px 命中半径
  stations.forEach(s => {
    const m = proj(s.x, s.y, 0);
    const d = (m[0] - e.clientX) ** 2 + (m[1] - e.clientY) ** 2;
    if (d < bd) { bd = d; best = s; }
  });
  if (!best) return;
  if (route) { // 已有完整路径 → 这次点击重新开始选起点
    clearRoute();
    selA = best.name; inA.value = best.name;
    return;
  }
  if (!selA) { selA = best.name; inA.value = best.name; }
  else if (best.name !== selA) { selB = best.name; inB.value = best.name; }
  if (selA && selB && selA !== selB) computeRoute();
}

// —— 换乘路径查询（代价 = 时间/分钟）——
const TRANSFER_MIN = 7; // 换乘代价（分钟）：调大更倾向少换乘
// 时间模型：区间运行速度 + 每停靠一站的停站/进出站耗时
// 地铁区间约 38 km/h + 每站 1 分钟 ≈ 市区密站段 2.5 分钟/站，与实际接近
const RUN_KMH = L => L.name === "磁浮线" ? 200 : L.name === "市域机场线" ? 110 : 38;
const DWELL_MIN = 1.0;
const lineIdx = new Map(lines.map((L, i) => [L.name, i]));
const nid = (name, li) => li + "|" + name; // 节点 = 车站 × 线路
const adj = new Map();
function addEdge(a, b, w, km, li, seg) {
  if (!adj.has(a)) adj.set(a, []);
  adj.get(a).push({ to: b, w, km, li, seg });
}
lines.forEach((L, li) => {
  const n = L.st.length, v = RUN_KMH(L);
  for (let i = 0; i + 1 < n; i++) {
    const km = L.cum[i + 1] - L.cum[i], w = km / v * 60 + DWELL_MIN;
    addEdge(nid(L.st[i][3], li), nid(L.st[i + 1][3], li), w, km, li, [i, i + 1]);
    addEdge(nid(L.st[i + 1][3], li), nid(L.st[i][3], li), w, km, li, [i + 1, i]);
  }
  if (L.ring) { // 环线闭合段（pts[n] 即 pts[0]）
    const km = L.cum[n] - L.cum[n - 1], w = km / v * 60 + DWELL_MIN;
    addEdge(nid(L.st[n - 1][3], li), nid(L.st[0][3], li), w, km, li, [n - 1, n]);
    addEdge(nid(L.st[0][3], li), nid(L.st[n - 1][3], li), w, km, li, [n, n - 1]);
  }
});
stations.forEach(s => {
  if (!s.hub) return;
  for (const a of s.lines) for (const b of s.lines) {
    if (a !== b) addEdge(nid(s.name, lineIdx.get(a)), nid(s.name, lineIdx.get(b)),
      TRANSFER_MIN, 0, -1, null);
  }
});

function dijkstra(aName, bName) {
  const dist = new Map(), prevE = new Map(), done = new Set();
  stMap.get(aName).lines.forEach(ln => dist.set(nid(aName, lineIdx.get(ln)), 0));
  for (;;) {
    let u = null, du = Infinity;
    dist.forEach((d, k) => { if (d < du && !done.has(k)) { du = d; u = k; } });
    if (u === null) break;
    done.add(u);
    for (const e of adj.get(u) || []) {
      if (du + e.w < (dist.has(e.to) ? dist.get(e.to) : Infinity)) {
        dist.set(e.to, du + e.w);
        prevE.set(e.to, { from: u, e });
      }
    }
  }
  let end = null, best = Infinity;
  stMap.get(bName).lines.forEach(ln => {
    const d = dist.get(nid(bName, lineIdx.get(ln)));
    if (d !== undefined && d < best) { best = d; end = nid(bName, lineIdx.get(ln)); }
  });
  if (end === null) return null;
  const edges = [];
  for (let cur = end; prevE.has(cur); cur = prevE.get(cur).from)
    edges.unshift(prevE.get(cur).e);
  return edges;
}

let route = null, selA = "", selB = "", camGoal = null;
const stName = (li, i) => lines[li].st[i % lines[li].st.length][3];

function computeRoute() {
  const edges = dijkstra(selA, selB);
  if (!edges || !edges.length) return;
  // 边序列 → 乘车段（legs）
  const legs = [];
  let km = 0, mins = 0, stops = 0;
  edges.forEach(e => {
    mins += e.w;
    if (e.li < 0) return; // 换乘边
    km += e.km; stops++;
    const last = legs[legs.length - 1];
    if (last && last.li === e.li) last.idx.push(e.seg[1]);
    else legs.push({ li: e.li, idx: [e.seg[0], e.seg[1]] });
  });
  // 路径折线（世界坐标）：高亮 + 光点动画共用
  const pts = [], cum = [0];
  legs.forEach(g => {
    g.pts = g.idx.map(i => lines[g.li].pts[i]);
    g.from = stName(g.li, g.idx[0]);
    g.to = stName(g.li, g.idx[g.idx.length - 1]);
    g.pts.forEach(p => pts.push(p));
  });
  for (let i = 1; i < pts.length; i++)
    cum.push(cum[i - 1] + Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]));
  route = { legs, pts, cum, len: cum[cum.length - 1], km, mins, stops,
    transfers: legs.slice(1).map(g => g.from) };
  // 清掉线路筛选，两种模式互斥
  selected = -1;
  [...legend.querySelectorAll(".chip")].forEach(c => {
    c.setAttribute("aria-pressed", "false"); c.classList.remove("dimmed");
  });
  selName.textContent = "路径";
  renderCard();
  flyTo(pts);
}

function renderCard() {
  const card = document.getElementById("routeCard");
  const mins = Math.round(route.mins);
  let h = `<div class="rc-head">${selA} → ${selB}</div>`;
  route.legs.forEach((g, i) => {
    const L = lines[g.li];
    if (i) h += `<div class="rc-tr">↳ ${g.from} 站内换乘</div>`;
    h += `<div class="rc-leg"><span class="badge" style="background:${L.color};color:${darkText(L.color) ? "#101820" : "#fff"}">${L.num}</span><span>${L.name}&ensp;${g.from} → ${g.to}<span style="color:var(--muted);white-space:nowrap">（${g.idx.length - 1}站）</span></span></div>`;
  });
  h += `<div class="rc-foot">共 ${route.stops} 站 · 换乘 ${route.transfers.length} 次 · 约 ${route.km.toFixed(1)} km · 预计 ${mins} 分钟</div>`;
  card.innerHTML = h; card.hidden = false;
}

function clearRoute() {
  route = null; selA = ""; selB = ""; camGoal = null;
  inA.value = ""; inB.value = "";
  document.getElementById("routeCard").hidden = true;
  if (selected === -1) selName.textContent = "全网";
}

function flyTo(pts) {
  let x0 = 1e9, x1 = -1e9, y0 = 1e9, y1 = -1e9;
  pts.forEach(p => {
    x0 = Math.min(x0, p[0]); x1 = Math.max(x1, p[0]);
    y0 = Math.min(y0, p[1]); y1 = Math.max(y1, p[1]);
  });
  const span = Math.max(x1 - x0, y1 - y0, 4);
  camGoal = { tx: (x0 + x1) / 2, ty: (y0 + y1) / 2,
    dist: Math.max(18, Math.min(180, span * 1.5 + 8)) };
}

const inA = document.getElementById("stA"), inB = document.getElementById("stB");
const dl = document.getElementById("stList");
stations.forEach(s => {
  const o = document.createElement("option");
  o.value = s.name;
  dl.appendChild(o);
});
function tryRoute() {
  const a = inA.value.trim(), b = inB.value.trim();
  if (stMap.has(a)) selA = a; // 单独填了有效起点也先给图上反馈
  if (stMap.has(b)) selB = b;
  if (!stMap.has(a) || !stMap.has(b) || a === b) return;
  computeRoute();
}
inA.addEventListener("change", tryRoute);
inB.addEventListener("change", tryRoute);
document.getElementById("swapBtn").addEventListener("click", () => {
  [inA.value, inB.value] = [inB.value, inA.value];
  tryRoute();
});
document.getElementById("routeClear").addEventListener("click", clearRoute);

// —— 悬停提示 ——
const tip = document.getElementById("tip");
const tipName = tip.querySelector(".tname"), tipLines = tip.querySelector(".tlines");
function hideTip() { tip.style.display = "none"; }
function showTip(s, x, y) {
  tipName.textContent = s.name;
  tipLines.textContent = s.lines.join(" · ");
  tip.style.display = "block";
  tip.style.left = Math.min(W - 220, x + 14) + "px";
  tip.style.top = Math.max(8, y - 40) + "px";
}

// —— 渲染 ——
let t0 = performance.now(), clock = 0;
function frame(now) {
  const dt = Math.min(0.05, (now - t0) / 1000); t0 = now;
  const speed = parseFloat(speedInput.value);
  clock += dt * speed;
  if (autoRotate && pointers.size === 0) cam.yaw += dt * 0.07;
  if (camGoal) { // 相机平滑飞向查询路径
    const k = Math.min(1, dt * 2.5);
    cam.tx += (camGoal.tx - cam.tx) * k;
    cam.ty += (camGoal.ty - cam.ty) * k;
    cam.dist += (camGoal.dist - cam.dist) * k;
    if (Math.abs(camGoal.dist - cam.dist) < 0.2 &&
        Math.hypot(camGoal.tx - cam.tx, camGoal.ty - cam.ty) < 0.2) camGoal = null;
  }
  updateProj();

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // 地面网格
  ctx.lineWidth = 1;
  ctx.strokeStyle = "rgba(90,130,190,0.08)";
  ctx.beginPath();
  for (let gx = -50; gx <= 50; gx += 5) {
    let m = proj(gx, -42, 0); ctx.moveTo(m[0], m[1]);
    m = proj(gx, 32, 0); ctx.lineTo(m[0], m[1]);
  }
  for (let gy = -42; gy <= 32; gy += 5) {
    let m = proj(-50, gy, 0); ctx.moveTo(m[0], m[1]);
    m = proj(50, gy, 0); ctx.lineTo(m[0], m[1]);
  }
  ctx.stroke();

  // 黄浦江
  ctx.lineJoin = "round"; ctx.lineCap = "round";
  ctx.beginPath();
  RIVER.forEach((p, i) => {
    const m = proj(p[0], p[1], 0);
    i ? ctx.lineTo(m[0], m[1]) : ctx.moveTo(m[0], m[1]);
  });
  ctx.strokeStyle = "rgba(28,66,108,0.4)";
  ctx.lineWidth = Math.max(6, 1.1 * PR.F / cam.dist);
  ctx.stroke();
  ctx.strokeStyle = "rgba(60,120,180,0.18)";
  ctx.lineWidth = 1;
  ctx.stroke();

  // 线路（两遍：辉光 + 芯线）
  const alphaOf = i => route ? 0.07 : (selected === -1 || selected === i) ? 1 : 0.10;
  lines.forEach((L, i) => {
    ctx.beginPath();
    L.pts.forEach((p, j) => {
      const m = proj(p[0], p[1], 0);
      j ? ctx.lineTo(m[0], m[1]) : ctx.moveTo(m[0], m[1]);
    });
    const a = alphaOf(i);
    ctx.globalAlpha = 0.16 * a;
    ctx.strokeStyle = L.color; ctx.lineWidth = 6.5;
    ctx.stroke();
    ctx.globalAlpha = (selected === i ? 1 : 0.85) * a;
    ctx.lineWidth = selected === i ? 2.6 : 1.9;
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // 车站
  const picks = [];
  lines.forEach((L, i) => {
    const a = alphaOf(i);
    if (a < 0.5) return;
    ctx.fillStyle = L.color;
    ctx.globalAlpha = 0.75 * a;
    L.st.forEach(s => {
      if (stMap.get(s[3]).hub) return;
      const p = toKm(s[0], s[1]);
      const m = proj(p[0], p[1], 0);
      ctx.beginPath(); ctx.arc(m[0], m[1], Math.max(1.3, m[2] * 0.09), 0, 7); ctx.fill();
    });
  });
  ctx.globalAlpha = 1;
  stations.forEach(s => {
    const vis = route ? false : (selected === -1 || s.lines.includes(lines[selected].name));
    const m = proj(s.x, s.y, 0);
    if (s.hub && vis) {
      const r = Math.max(2.1, m[2] * 0.12);
      ctx.beginPath(); ctx.arc(m[0], m[1], r, 0, 7);
      ctx.fillStyle = "#eef3fa"; ctx.fill();
      ctx.beginPath(); ctx.arc(m[0], m[1], r + 1.6, 0, 7);
      ctx.strokeStyle = "rgba(238,243,250,0.35)"; ctx.lineWidth = 1; ctx.stroke();
    }
    if (vis) picks.push({ s, x: m[0], y: m[1] });
  });

  // 列车光点（加法混合）
  ctx.globalCompositeOperation = "lighter";
  trains.forEach(tr => {
    const L = lines[tr.li];
    const a = alphaOf(tr.li);
    if (a < 0.5) return;
    let s, dir;
    if (L.ring) {
      s = (clock * 2.3 + tr.phase) % L.len; dir = 1;
    } else {
      const u = (clock * 2.3 + tr.phase) % (2 * L.len);
      dir = u < L.len ? 1 : -1;
      s = u < L.len ? u : 2 * L.len - u;
    }
    // 彗尾
    for (let k = 7; k >= 1; k--) {
      const q = pointAt(L, s - dir * k * 0.45);
      const m = proj(q[0], q[1], 0.06);
      ctx.globalAlpha = 0.10 * (1 - k / 8) * a;
      ctx.fillStyle = L.color;
      ctx.beginPath(); ctx.arc(m[0], m[1], 2.6 * (1 - k / 10), 0, 7); ctx.fill();
    }
    const h = pointAt(L, s);
    const m = proj(h[0], h[1], 0.06);
    ctx.globalAlpha = 0.55 * a;
    ctx.fillStyle = L.color;
    ctx.beginPath(); ctx.arc(m[0], m[1], 3.6, 0, 7); ctx.fill();
    ctx.globalAlpha = 0.95 * a;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(m[0], m[1], 1.4, 0, 7); ctx.fill();
  });
  ctx.globalCompositeOperation = "source-over";
  ctx.globalAlpha = 1;

  // 查询路径高亮
  if (route) {
    ctx.lineJoin = "round"; ctx.lineCap = "round";
    route.legs.forEach(g => {
      const L = lines[g.li];
      ctx.beginPath();
      g.pts.forEach((p, j) => {
        const m = proj(p[0], p[1], 0);
        j ? ctx.lineTo(m[0], m[1]) : ctx.moveTo(m[0], m[1]);
      });
      ctx.globalAlpha = 0.35; ctx.strokeStyle = L.color; ctx.lineWidth = 8; ctx.stroke();
      ctx.globalAlpha = 1; ctx.lineWidth = 3; ctx.stroke();
    });
    // 沿途车站
    route.legs.forEach(g => {
      g.pts.forEach((p, j) => {
        const m = proj(p[0], p[1], 0);
        ctx.beginPath(); ctx.arc(m[0], m[1], Math.max(1.6, m[2] * 0.1), 0, 7);
        ctx.fillStyle = "#eef3fa"; ctx.fill();
        picks.push({ s: stMap.get(stName(g.li, g.idx[j])), x: m[0], y: m[1] });
      });
    });
    // 换乘站：常亮圈 + 向外扩散的波纹
    route.legs.slice(1).forEach(g => {
      const p = g.pts[0], m = proj(p[0], p[1], 0);
      const base = Math.max(7, m[2] * 0.3);
      const ph = (now * 0.0016) % 1;
      ctx.strokeStyle = lines[g.li].color;
      ctx.globalAlpha = 0.95; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(m[0], m[1], base, 0, 7); ctx.stroke();
      ctx.globalAlpha = 0.7 * (1 - ph); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(m[0], m[1], base + ph * 18, 0, 7); ctx.stroke();
      ctx.globalAlpha = 1;
    });
    // 光点沿路径行进
    if (route.len > 0) {
      const sPos = (clock * 2.6) % route.len;
      ctx.globalCompositeOperation = "lighter";
      for (let k = 6; k >= 0; k--) {
        const q = pointAt(route, sPos - k * 0.5);
        const m = proj(q[0], q[1], 0.08);
        ctx.globalAlpha = k ? 0.12 * (1 - k / 7) : 0.9;
        ctx.fillStyle = k ? "#8fd0ff" : "#ffffff";
        ctx.beginPath(); ctx.arc(m[0], m[1], k ? 3 : 2.2, 0, 7); ctx.fill();
      }
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
    }
    // 起终点 + 换乘标注
    ctx.font = "11px Bahnschrift, 'Microsoft YaHei', sans-serif";
    ctx.textAlign = "center";
    const mark = (name, txt, col) => { // 起终点：立杆 + 顶部文字
      const st = stMap.get(name);
      const g0 = proj(st.x, st.y, 0), h0 = proj(st.x, st.y, 2.8);
      ctx.strokeStyle = "rgba(141,160,188,0.5)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(g0[0], g0[1]); ctx.lineTo(h0[0], h0[1]); ctx.stroke();
      ctx.fillStyle = col; ctx.fillText(txt, h0[0], h0[1] - 6);
    };
    mark(selA, "▲ " + selA, "#7fe08f");
    mark(selB, "▼ " + selB, "#ff8f7f");
    // 换乘文字放光环下方，不与顶部标注抢位
    route.legs.slice(1).forEach(g => {
      const m = proj(g.pts[0][0], g.pts[0][1], 0);
      const base = Math.max(7, m[2] * 0.3);
      ctx.fillStyle = "rgba(233,238,246,0.92)";
      ctx.fillText(`⇋ ${g.from} 换乘${lines[g.li].name}`, m[0], m[1] + base + 16);
    });
  } else if (selA && stMap.has(selA)) {
    // 已选起点、待选终点：绿色波纹反馈
    const st = stMap.get(selA);
    const g0 = proj(st.x, st.y, 0), h0 = proj(st.x, st.y, 2.8);
    const ph = (now * 0.0016) % 1;
    ctx.strokeStyle = "#7fe08f";
    ctx.globalAlpha = 0.95; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(g0[0], g0[1], 6, 0, 7); ctx.stroke();
    ctx.globalAlpha = 0.7 * (1 - ph); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(g0[0], g0[1], 6 + ph * 16, 0, 7); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = "rgba(141,160,188,0.5)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(g0[0], g0[1]); ctx.lineTo(h0[0], h0[1]); ctx.stroke();
    ctx.font = "11px Bahnschrift, 'Microsoft YaHei', sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = "#7fe08f";
    ctx.fillText("▲ " + selA + " · 再点终点站", h0[0], h0[1] - 6);
  }

  // 地名标注（立杆 + 文字）
  ctx.font = "11px Bahnschrift, 'Microsoft YaHei', sans-serif";
  ctx.textAlign = "center";
  const placed = []; // 按优先级避让，重叠只画先者
  if (!route && selA && stMap.has(selA)) { // 起点绿色标注先占位，地名让开
    const h = proj(stMap.get(selA).x, stMap.get(selA).y, 2.8);
    placed.push([h[0] - 60, h[1] - 11], [h[0] + 60, h[1] - 11]);
  }
  LABELS.forEach(s => {
    if (route) return; // 路径模式下只显示路径自己的标注
    if (s.name === selA) return; // 已被选为起点，绿色标注接管
    if (selected !== -1 && !s.lines.includes(lines[selected].name)) return;
    const g = proj(s.x, s.y, 0), h = proj(s.x, s.y, 2.4);
    const lx = h[0], ly = h[1] - 5;
    if (placed.some(p => Math.abs(p[0] - lx) < 76 && Math.abs(p[1] - ly) < 16)) return;
    placed.push([lx, ly]);
    ctx.strokeStyle = "rgba(141,160,188,0.35)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(g[0], g[1]); ctx.lineTo(h[0], h[1]); ctx.stroke();
    ctx.fillStyle = "rgba(233,238,246,0.88)";
    ctx.fillText(s.name, lx, ly);
  });

  // 悬停命中
  if (hoverPt && pointers.size === 0) {
    let best = null, bd = 169;
    for (const p of picks) {
      const d = (p.x - hoverPt.x) ** 2 + (p.y - hoverPt.y) ** 2;
      if (d < bd) { bd = d; best = p; }
    }
    best ? showTip(best.s, best.x, best.y) : hideTip();
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
