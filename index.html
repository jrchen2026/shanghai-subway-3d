<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f4f1ea">
<title>上海轨道交通 · 全网 3D</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f4f1ea;
    --panel: rgba(255, 255, 255, 0.88);
    --panel-line: rgba(30, 35, 40, 0.12);
    --ink: #1d2126;
    --muted: #5c6670;
    --faint: #98a1aa;
    --accent: #e3002a;
    font-family: Bahnschrift, "DIN Alternate", "Helvetica Neue", "Segoe UI",
      "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", sans-serif;
  }
  html, body { height: 100%; margin: 0; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body { background: var(--bg); color: var(--ink); overflow: hidden; }
  #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block;
    cursor: grab; touch-action: none; }
  #scene.dragging { cursor: grabbing; }

  .hud { position: fixed; z-index: 2; }
  .panel {
    background: var(--panel); border: 1px solid var(--panel-line);
    border-radius: 12px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 2px 12px rgba(30, 35, 40, 0.08);
  }

  #title { top: 20px; left: 22px; pointer-events: none; max-width: min(72vw, 420px); }
  #title .eyebrow {
    font-size: 11px; letter-spacing: 0.32em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 6px;
  }
  #title h1 {
    margin: 0; font-size: clamp(22px, 4.2vw, 34px); font-weight: 700;
    letter-spacing: 0.04em; line-height: 1.15; text-wrap: balance;
  }
  #title h1 .dot { color: var(--accent); }
  #title .sub { margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.6; }
  #stats {
    margin-top: 10px; font-size: 12px; color: var(--faint);
    font-variant-numeric: tabular-nums; letter-spacing: 0.06em;
  }

  .chip:focus-visible {
    outline: 2px solid var(--ink); outline-offset: 2px;
  }

  #legend {
    bottom: 14px; left: 50%; transform: translateX(-50%);
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 5px; padding: 6px 10px; max-width: 94vw;
    transition: opacity 0.25s;
  }
  #legend.faded { opacity: 0.12; }
  #selName {
    font-size: 12px; color: var(--muted); letter-spacing: 0.06em;
    padding-right: 7px; border-right: 1px solid var(--panel-line); margin-right: 3px;
    white-space: nowrap; width: 5em; text-align: center; flex: none;
    /* 定宽（按"市域机场线"5字预留）：文字变化不再撑动两排徽章换行 */
  }
  .chip {
    display: block; cursor: pointer; border: 1px solid transparent;
    background: none; padding: 2px; border-radius: 8px; font: inherit;
  }
  .chip:hover { border-color: rgba(30, 35, 40, 0.3); }
  .chip[aria-pressed="true"] { border-color: rgba(30, 35, 40, 0.75); }
  .chip .badge {
    width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center;
    font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums;
  }
  .chip.dimmed { opacity: 0.32; }

  #hint {
    bottom: 18px; right: 22px; font-size: 11px; color: var(--faint);
    letter-spacing: 0.08em; pointer-events: none; text-align: right; line-height: 1.7;
  }

  #tip {
    position: fixed; z-index: 3; pointer-events: none; display: none;
    background: rgba(255, 255, 255, 0.95); border: 1px solid var(--panel-line);
    border-radius: 8px; padding: 6px 10px; font-size: 12px; line-height: 1.5;
    max-width: 240px; box-shadow: 0 2px 10px rgba(30, 35, 40, 0.1);
  }
  #tip .tname { font-weight: 700; letter-spacing: 0.04em; }
  #tip .tlines { color: var(--muted); font-size: 11px; margin-top: 2px; }

  #routeBox { top: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; align-items: center; padding: 7px 9px; }
  #routeBox input { font: inherit; font-size: 13px; color: var(--ink);
    background: rgba(30,35,40,0.045); border: 1px solid var(--panel-line);
    border-radius: 7px; padding: 6px 9px; width: 112px; }
  #routeBox input::placeholder { color: var(--faint); }
  #routeBox input:focus { outline: none; border-color: rgba(30,35,40,0.45); }
  .rbtn { font: inherit; font-size: 13px; color: var(--muted); background: none;
    border: 1px solid transparent; border-radius: 7px; padding: 5px 7px; cursor: pointer; }
  .rbtn:hover { color: var(--ink); border-color: rgba(30,35,40,0.25); }

  #routeCard { top: 76px; right: 22px; width: 250px; padding: 12px 14px;
    font-size: 12px; line-height: 1.6; max-height: calc(100vh - 140px); overflow-y: auto; }
  #routeCard .rc-head { font-weight: 700; font-size: 14px; letter-spacing: 0.04em; margin-bottom: 8px; }
  #routeCard .rc-leg { display: flex; gap: 7px; align-items: baseline; margin: 4px 0; }
  #routeCard .rc-leg .badge { flex: none; width: 20px; height: 20px; border-radius: 50%;
    display: inline-grid; place-items: center; font-size: 11px; font-weight: 800;
    transform: translateY(4px); }
  #routeCard .rc-tr { color: var(--muted); font-size: 11px; margin: 2px 0 2px 25px; }
  #routeCard .rc-tr.virt { color: #c2410c; font-weight: 700; }
  #routeCard .rc-foot { margin-top: 9px; padding-top: 8px; border-top: 1px solid var(--panel-line);
    color: var(--muted); font-variant-numeric: tabular-nums; }
  #routeCard .rc-share { display: flex; gap: 6px; margin-top: 8px; }
  .rc-sbtn { flex: 1; font: inherit; font-size: 11px; color: var(--muted);
    background: rgba(30,35,40,0.045); border: 1px solid var(--panel-line);
    border-radius: 6px; padding: 5px 4px; cursor: pointer; }
  .rc-sbtn:hover { color: var(--ink); border-color: rgba(30,35,40,0.3); }

  #shareModal { position: fixed; inset: 0; z-index: 10; background: rgba(20,22,25,0.55);
    display: flex; align-items: center; justify-content: center; padding: 24px; }
  #shareModal[hidden] { display: none; }
  #shareModal .share-box { position: relative; max-width: min(94vw, 420px); max-height: 90vh;
    background: var(--bg); border-radius: 14px; padding: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    display: flex; flex-direction: column; align-items: center; gap: 8px; overflow: auto; }
  #shareModal img { width: 100%; border-radius: 8px; display: block; }
  #shareModal img[hidden] { display: none; }
  #shareModal .share-hint { font-size: 12px; color: var(--muted); }
  #shareModal .share-loading { padding: 60px 20px; font-size: 13px; color: var(--muted); }
  #shareModal .share-error { padding: 30px 10px; font-size: 13px; color: #c2410c;
    text-align: center; line-height: 1.6; max-width: 280px; }
  #shareModal #shareModalClose { position: absolute; top: -14px; right: -14px; width: 30px; height: 30px;
    border-radius: 50%; border: none; background: #1d2126; color: #fff; font-size: 14px; cursor: pointer;
    display: grid; place-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  /* 站名候选面板 */
  #sugg { position: fixed; z-index: 4; padding: 4px; max-height: 42vh; overflow-y: auto; }
  .sg { display: flex; width: 100%; box-sizing: border-box; gap: 5px; align-items: center;
    padding: 8px 9px; border-radius: 7px; cursor: pointer; font: inherit; font-size: 13px;
    color: var(--ink); background: none; border: none; text-align: left; }
  .sg:hover, .sg:focus-visible { background: rgba(30,35,40,0.06); outline: none; }
  .sg .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-right: 5px; }
  .sg .b { flex: none; width: 17px; height: 17px; border-radius: 50%; font-size: 10px;
    font-weight: 800; display: inline-grid; place-items: center; }

  @media (max-width: 960px) {
    /* 平板：查询框靠右上，避免与标题重叠；16px 防 iOS 聚焦缩放 */
    #routeBox { left: auto; right: 14px; transform: none; }
    #routeBox input { font-size: 16px; }
    #routeCard { top: 84px; right: 14px; }
  }
  @media (max-width: 640px) {
    /* 查询优先：标题缩成一行，查询框通栏置顶 */
    #title { left: 12px; top: 10px; max-width: none; }
    #title .eyebrow, #title .sub, #stats { display: none; }
    #title h1 { font-size: 15px; letter-spacing: 0.1em; }
    #routeBox { top: 38px; left: 10px; right: 10px; }
    #routeBox input { flex: 1; width: auto; min-width: 0; padding: 9px 10px; }
    .rbtn { font-size: 16px; padding: 9px 10px; }
    #hint { display: none; }
    /* 结果卡片：查询框下方通栏，字号加大（一瞥即读） */
    #routeCard { top: 100px; left: 10px; right: 10px; width: auto; max-height: 38vh;
      font-size: 14px; }
    #routeCard .rc-head { font-size: 16px; }
    #routeCard .rc-leg .badge { width: 24px; height: 24px; font-size: 13px; }
    #routeCard .rc-tr { font-size: 13px; margin-left: 31px; }
    .rc-sbtn { font-size: 13px; padding: 9px 4px; }
    /* 候选面板：加大点击目标 */
    .sg { font-size: 16px; padding: 12px 12px; }
    .sg .b { width: 20px; height: 20px; font-size: 11px; }
    /* 徽章栏：单行横向滑动，MTA 式大圆徽章 */
    #legend { bottom: 10px; left: 10px; right: 10px; transform: none;
      max-width: none; flex-wrap: nowrap; justify-content: flex-start;
      overflow-x: auto; scrollbar-width: none; }
    #legend::-webkit-scrollbar { display: none; }
    .chip, #selName { flex: none; }
    .chip .badge { width: 32px; height: 32px; font-size: 16px; }
    #selName { font-size: 13px; }
  }
</style>
</head>

<canvas id="scene" aria-label="上海轨道交通全网三维动态图"></canvas>

<div class="hud" id="title">
  <div class="eyebrow">Shanghai Metro</div>
  <h1>上海轨道交通<span class="dot"> · </span>全网</h1>
  <div class="sub">拖拽平移，滚轮或双指缩放；输入或点选起终点查换乘，点击下方线路徽章可单看一条线。</div>
  <div id="stats"></div>
</div>

<div class="hud panel" id="routeBox" role="search" aria-label="换乘查询">

  <button class="rbtn" id="routeClear" title="清除路径" aria-label="清除路径">✕</button>
</div>
<div class="panel" id="sugg" role="listbox" aria-label="站名候选" hidden></div>
<div class="hud panel" id="routeCard" hidden></div>

<div class="hud panel" id="legend" role="group" aria-label="线路筛选"><span id="selName">全网</span></div>

<div class="hud" id="hint">拖拽 平移 &middot; 滚轮 / 双指 缩放<br>点击车站 设起终点</div>

<div id="tip"><div class="tname"></div><div class="tlines"></div></div>

<div id="shareModal" hidden>
  <div class="share-box">
    <button id="shareModalClose" aria-label="关闭">✕</button>
    <div class="share-loading">生成中…</div>

    <img alt="换乘路径分享图" hidden>
    <div class="share-hint" hidden>长按图片保存或发送</div>
  </div>
</div>

// —— 坐标：经纬度 → 本地公里坐标（x 向东，y 向北，z 向上）——
const LON0 = 121.45, LAT0 = 31.22;
const KX = 111.32 * Math.cos(LAT0 * Math.PI / 180), KY = 110.9;
const toKm = (lon, lat) => [(lon - LON0) * KX, (lat - LAT0) * KY];

// 黄浦江（示意走向：闵行 → 陆家嘴湾 → 吴淞口）
const RIVER = [[121.435,31.02],[121.47,31.055],[121.48,31.09],[121.463,31.115],
  [121.455,31.145],[121.472,31.163],[121.487,31.178],[121.492,31.196],
  [121.502,31.205],[121.497,31.222],[121.487,31.235],[121.498,31.247],
  [121.52,31.255],[121.545,31.263],[121.556,31.283],[121.548,31.305],
  [121.552,31.33],[121.535,31.355],[121.52,31.375],[121.508,31.392]]
  .map(p => toKm(p[0], p[1]));

// —— 线路预处理 ——
const lines = DATA.map((L, li) => {
  const ring = L.name === "4号线";
  // 共线段不再用世界坐标错开，改为渲染时按屏幕像素并排（见 segShare/slot）
  const pts = L.st.map(s => toKm(s[0], s[1]));
  if (ring) pts.push(pts[0]);
  const cum = [0];
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i][0] - pts[i-1][0], dy = pts[i][1] - pts[i-1][1];
    cum.push(cum[i-1] + Math.hypot(dx, dy));
  }
  const num = L.name.endsWith("号线") ? L.name.replace("号线", "") : L.name[0];
  return { name: L.name, num, color: L.color,
    st: L.st, pts, cum, len: cum[cum.length - 1], ring };
});

// —— 共线段检测：两线连接同一对相邻车站 → 渲染时按屏幕像素并排错开 ——
const segShare = new Map();
const segKey = (a, b) => a < b ? a + "|" + b : b + "|" + a;
lines.forEach((L, li) => {
  const n = L.st.length;
  for (let i = 0; i + 1 < n; i++) {
    const k = segKey(L.st[i][3], L.st[i + 1][3]);
    if (!segShare.has(k)) segShare.set(k, []);
    segShare.get(k).push(li);
  }
  if (L.ring) {
    const k = segKey(L.st[n - 1][3], L.st[0][3]);
    if (!segShare.has(k)) segShare.set(k, []);
    segShare.get(k).push(li);
  }
});
lines.forEach((L, li) => {
  const n = L.st.length, m = L.pts.length - 1; // 段数（环线含闭合段）
  L.slot = [];
  for (let i = 0; i < m; i++) {
    const a = L.st[i % n][3], b = L.st[(i + 1) % n][3];
    const g = segShare.get(segKey(a, b));
    let slot = g.length > 1 ? g.indexOf(li) - (g.length - 1) / 2 : 0;
    // 槽位符号按站名字典序归一：两线反向走同一走廊时（如3/4号线），
    // 屏幕法线随行进方向翻转，符号不归一会偏到同一侧重新叠住
    if (slot && a > b) slot = -slot;
    L.slot.push(slot);
  }
});

// 站名 → 途经线路（用于换乘判定与悬停提示）
const stMap = new Map();
lines.forEach(L => L.st.forEach(s => {
  const key = s[3];
  if (!stMap.has(key)) {
    const p = toKm(s[0], s[1]);
    stMap.set(key, { name: key, x: p[0], y: p[1], lines: [], color: L.color });
  }
  const e = stMap.get(key);
  if (!e.lines.includes(L.name)) e.lines.push(L.name);
}));
const stations = [...stMap.values()];
stations.forEach(s => s.hub = s.lines.length > 1);

  "龙阳路","世纪大道","徐家汇","上海南站"];
const TERMINI = new Set();
lines.forEach(L => {
  TERMINI.add(L.st[0][3]);
  if (!L.ring) TERMINI.add(L.st[L.st.length - 1][3]);
});
stations.forEach(s => {
  s.tier = WHITELIST.includes(s.name) ? 0
    : s.lines.length >= 3 ? 1
    : TERMINI.has(s.name) ? 2
    : s.hub ? 3 : 4;
});
const LBL = stations.filter(s => s.tier <= 3)
  .sort((a, b) => a.tier - b.tier || b.lines.length - a.lines.length);

const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const trains = [];
lines.forEach((L, li) => {
  const n = Math.max(3, Math.round(L.len / 7));
  for (let i = 0; i < n; i++) {
    trains.push({ li, phase: (L.ring ? L.len : 2 * L.len) * i / n });
  }
});
function pointAt(L, s) {
  s = Math.max(0, Math.min(L.len, s));
  let lo = 0, hi = L.cum.length - 1;
  while (lo + 1 < hi) { const m = (lo + hi) >> 1; (L.cum[m] <= s) ? lo = m : hi = m; }
  const t = (s - L.cum[lo]) / (L.cum[hi] - L.cum[lo] || 1);
  const a = L.pts[lo], b = L.pts[hi];
  return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
}

// —— 相机（固定视角：北朝上 + 轻微俯视倾角，只平移/缩放）——
const cam = { yaw: 0, pitch: 1.15, dist: 84, tx: 0, ty: 0 };
{ // 初始取景：按全网包围盒居中，避免构图偏斜
  let x0 = 1e9, x1 = -1e9, y0 = 1e9, y1 = -1e9;
  stations.forEach(s => {
    x0 = Math.min(x0, s.x); x1 = Math.max(x1, s.x);
    y0 = Math.min(y0, s.y); y1 = Math.max(y1, s.y);
  });
  cam.tx = (x0 + x1) / 2; cam.ty = (y0 + y1) / 2;
  // F = 1.5·min(W,H)：dist ≥ spanX·F/W 填满宽、≥ spanY·sin(pitch)·F/H 填满高
  const aw = innerWidth / innerHeight;
  const needX = 1.5 * (x1 - x0) / Math.max(aw, 1);
  const needY = 1.5 * (y1 - y0) * Math.sin(cam.pitch) * Math.min(aw, 1);
  // 竖屏装不下全宽：市区优先（约 45 km 视野），远端靠平移/查询飞行
  const need = aw >= 1 ? Math.max(needX, needY) : needY * 1.8;
  cam.dist = Math.max(18, Math.min(180, need * 1.06));
}

let PR = { cy: 1, sy: 0, cp: 1, sp: 0, F: 900 };
function updateProj() {
  PR.cy = Math.cos(cam.yaw); PR.sy = Math.sin(cam.yaw);
  PR.cp = Math.cos(cam.pitch); PR.sp = Math.sin(cam.pitch);
  PR.F = Math.min(W, H) * 1.5;
}
// 世界(km) → 屏幕(px)。返回 [x, y, 透视缩放]
function proj(x, y, z) {
  const px = x - cam.tx, py = y - cam.ty;
  const rx = px * PR.cy - py * PR.sy;
  const ry = px * PR.sy + py * PR.cy;
  const vY = ry * PR.sp + z * PR.cp;
  const vZ = Math.max(2, ry * PR.cp - z * PR.sp + cam.dist);
  const s = PR.F / vZ;
  return [W / 2 + rx * s, H / 2 - vY * s, s];
}

// —— 交互 ——
const pointers = new Map();
let lastPinch = 0, hoverPt = null, downAt = null;
canvas.addEventListener("pointerdown", e => {
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  downAt = pointers.size === 1 ? { x: e.clientX, y: e.clientY } : null;
  canvas.classList.add("dragging");
  document.getElementById("legend").classList.add("faded");
});
canvas.addEventListener("pointermove", e => {
  if (!pointers.has(e.pointerId)) { hoverPt = { x: e.clientX, y: e.clientY }; return; }
  const p = pointers.get(e.pointerId);
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  p.x = e.clientX; p.y = e.clientY;
  if (pointers.size === 1) { // 拖拽 = 平移（视角固定，与地图软件一致）
    if (Math.abs(dx) + Math.abs(dy) > 0) camGoal = null;
    const k = cam.dist / PR.F;
    const mx = dx * k, my = -dy * k / Math.max(0.25, PR.sp);
    cam.tx -= mx * PR.cy + my * PR.sy;
    cam.ty -= -mx * PR.sy + my * PR.cy;
  } else if (pointers.size === 2) {
    const [a, b] = [...pointers.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    if (lastPinch) cam.dist = Math.max(18, Math.min(180, cam.dist * lastPinch / d));
    lastPinch = d;
  }
  hoverPt = null; hideTip();
});
function endPointer(e) {
  pointers.delete(e.pointerId); lastPinch = 0;
  if (!pointers.size) {
    canvas.classList.remove("dragging");
    document.getElementById("legend").classList.remove("faded");
  }
}
canvas.addEventListener("pointerup", e => { pickStation(e); endPointer(e); });
canvas.addEventListener("pointercancel", e => { downAt = null; endPointer(e); });
canvas.addEventListener("pointerleave", () => { hoverPt = null; hideTip(); });
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  camGoal = null;
  cam.dist = Math.max(18, Math.min(180, cam.dist * Math.exp(e.deltaY * 0.0012)));
}, { passive: false });

// 点击（非拖拽）选起终点
function pickStation(e) {
  if (!downAt) return;
  const moved = Math.hypot(e.clientX - downAt.x, e.clientY - downAt.y);
  downAt = null;
  if (moved > 6) return;
  let best = null, bd = 196; // 14px 命中半径
  stations.forEach(s => {
    const m = proj(s.x, s.y, 0);
    const d = (m[0] - e.clientX) ** 2 + (m[1] - e.clientY) ** 2;
    if (d < bd) { bd = d; best = s; }
  });
  if (!best) return;
  if (route) { // 已有完整路径 → 这次点击重新开始选起点
    clearRoute();
    selA = best.name; inA.value = best.name;
    return;
  }
  if (!selA) { selA = best.name; inA.value = best.name; }
  else if (best.name !== selA) { selB = best.name; inB.value = best.name; }
  if (selA && selB && selA !== selB) computeRoute();
}

  const n = parseInt(c.slice(1), 16);

  return lum > 150;
};

// —— 换乘路径查询（代价 = 时间/分钟）——
const TRANSFER_MIN = 7; // 换乘代价（分钟）：调大更倾向少换乘
// 时间模型：区间运行速度 + 每停靠一站的停站/进出站耗时
// 地铁区间约 38 km/h + 每站 1 分钟 ≈ 市区密站段 2.5 分钟/站，与实际接近
const RUN_KMH = L => L.name === "磁浮线" ? 200 : L.name === "市域机场线" ? 110 : 38;
const DWELL_MIN = 1.0;
// 出站换乘（虚拟换乘，2026-07 联网核实仍存续的 4 处）：
// 站内换不了，惩罚用出站步行+出入闸的实际分钟数，寻路自然倾向绕开
const VIRT = {
  "上海火车站": { a: ["1号线"], b: ["3号线", "4号线"], min: 12 },
  "南京西路": { a: ["2号线"], b: ["12号线", "13号线"], min: 10 },
  "长清路": { a: ["7号线"], b: ["13号线"], min: 9 },
  "虹桥2号航站楼": { a: ["2号线"], b: ["10号线"], min: 8, note: "部分方向可站内" },
};
const virtOf = (name, la, lb) => {
  const v = VIRT[name];
  if (!v) return null;
  return (v.a.includes(la) && v.b.includes(lb)) ||
         (v.a.includes(lb) && v.b.includes(la)) ? v : null;
};
const lineIdx = new Map(lines.map((L, i) => [L.name, i]));
const nid = (name, li) => li + "|" + name; // 节点 = 车站 × 线路
const adj = new Map();
function addEdge(a, b, w, km, li, seg, virt) {
  if (!adj.has(a)) adj.set(a, []);
  adj.get(a).push({ to: b, w, km, li, seg, virt });
}
lines.forEach((L, li) => {
  const n = L.st.length, v = RUN_KMH(L);
  for (let i = 0; i + 1 < n; i++) {
    const km = L.cum[i + 1] - L.cum[i], w = km / v * 60 + DWELL_MIN;
    addEdge(nid(L.st[i][3], li), nid(L.st[i + 1][3], li), w, km, li, [i, i + 1]);
    addEdge(nid(L.st[i + 1][3], li), nid(L.st[i][3], li), w, km, li, [i + 1, i]);
  }
  if (L.ring) { // 环线闭合段（pts[n] 即 pts[0]）
    const km = L.cum[n] - L.cum[n - 1], w = km / v * 60 + DWELL_MIN;
    addEdge(nid(L.st[n - 1][3], li), nid(L.st[0][3], li), w, km, li, [n - 1, n]);
    addEdge(nid(L.st[0][3], li), nid(L.st[n - 1][3], li), w, km, li, [n, n - 1]);
  }
});
stations.forEach(s => {
  if (!s.hub) return;
  for (const a of s.lines) for (const b of s.lines) {
    if (a === b) continue;
    const v = virtOf(s.name, a, b);
    addEdge(nid(s.name, lineIdx.get(a)), nid(s.name, lineIdx.get(b)),
      v ? v.min : TRANSFER_MIN, 0, -1, null, v);
  }
});

function dijkstra(aName, bName) {
  const dist = new Map(), prevE = new Map(), done = new Set();
  stMap.get(aName).lines.forEach(ln => dist.set(nid(aName, lineIdx.get(ln)), 0));
  for (;;) {
    let u = null, du = Infinity;
    dist.forEach((d, k) => { if (d < du && !done.has(k)) { du = d; u = k; } });
    if (u === null) break;
    done.add(u);
    for (const e of adj.get(u) || []) {
      if (du + e.w < (dist.has(e.to) ? dist.get(e.to) : Infinity)) {
        dist.set(e.to, du + e.w);
        prevE.set(e.to, { from: u, e });
      }
    }
  }
  let end = null, best = Infinity;
  stMap.get(bName).lines.forEach(ln => {
    const d = dist.get(nid(bName, lineIdx.get(ln)));
    if (d !== undefined && d < best) { best = d; end = nid(bName, lineIdx.get(ln)); }
  });
  if (end === null) return null;
  const edges = [];
  for (let cur = end; prevE.has(cur); cur = prevE.get(cur).from)
    edges.unshift(prevE.get(cur).e);
  return edges;
}

let route = null, selA = "", selB = "", camGoal = null;
const stName = (li, i) => lines[li].st[i % lines[li].st.length][3];

function computeRoute() {
  const edges = dijkstra(selA, selB);
  if (!edges || !edges.length) return;
  // 边序列 → 乘车段（legs）
  const legs = [];
  let km = 0, mins = 0, stops = 0, pendVirt = null;
  edges.forEach(e => {
    mins += e.w;
    if (e.li < 0) { pendVirt = e.virt || null; return; } // 换乘边
    km += e.km; stops++;
    const last = legs[legs.length - 1];
    if (last && last.li === e.li) last.idx.push(e.seg[1]);
    else { legs.push({ li: e.li, idx: [e.seg[0], e.seg[1]], virt: pendVirt }); pendVirt = null; }
  });
  // 路径折线（世界坐标）：高亮 + 光点动画共用
  const pts = [], cum = [0];
  legs.forEach(g => {
    g.pts = g.idx.map(i => lines[g.li].pts[i]);
    g.from = stName(g.li, g.idx[0]);
    g.to = stName(g.li, g.idx[g.idx.length - 1]);
    g.pts.forEach(p => pts.push(p));
  });
  for (let i = 1; i < pts.length; i++)
    cum.push(cum[i - 1] + Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]));
  route = { legs, pts, cum, len: cum[cum.length - 1], km, mins, stops,
    transfers: legs.slice(1).map(g => g.from) };
  // 清掉线路筛选，两种模式互斥
  selected = -1;
  [...legend.querySelectorAll(".chip")].forEach(c => {
    c.setAttribute("aria-pressed", "false"); c.classList.remove("dimmed");
  });
  selName.textContent = "路径";
  renderCard();
  flyTo(pts);
  history.replaceState(null, "", "#r=" + stIdx.get(selA) + "," + stIdx.get(selB));
}

const routeCardEl = document.getElementById("routeCard");
function renderCard() {
  const mins = Math.round(route.mins);
  let h = `<div class="rc-head">${selA} → ${selB}</div>`;
  route.legs.forEach((g, i) => {
    const L = lines[g.li];
    if (i) h += g.virt
      ? `<div class="rc-tr virt">↳ ${g.from} ⚠ 出站换乘 约${g.virt.min}分钟（刷码30分钟内连续计费${g.virt.note ? "，" + g.virt.note : ""}）</div>`
      : `<div class="rc-tr">↳ ${g.from} 站内换乘</div>`;
    h += `<div class="rc-leg"><span class="badge" style="background:${L.color};color:${darkText(L.color) ? "#101820" : "#fff"}">${L.num}</span><span>${L.name}&ensp;${g.from} → ${g.to}<span style="color:var(--muted);white-space:nowrap">（${g.idx.length - 1}站）</span></span></div>`;
  });
  h += `<div class="rc-foot">共 ${route.stops} 站 · 换乘 ${route.transfers.length} 次 · 约 ${route.km.toFixed(1)} km · 预计 ${mins} 分钟</div>`;
  h += `<div class="rc-share"><button class="rc-sbtn" id="rcCopyBtn">🔗 复制链接</button><button class="rc-sbtn" id="rcImgBtn">🖼 生成分享图</button></div>`;

// —— 分享：链接（URL hash 用车站序号短码代替全名，打开即自动查询）——
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(text);
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.left = "-9999px";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); } catch (e) {}
  document.body.removeChild(ta);
  return Promise.resolve();
}

  });
}

// —— 分享：卡图（把当前路径渲染成一张可长按保存的图片）——
// 布局思路（2026-07-14 与 advisor 讨论定稿）：结论数字（时长/换乘）上提到头部大字区，
// 给"收图的人"一眼看到钩子；正文改成地铁产品常见的"路线脊柱"——左侧一条按线路色连续
// 涂色的竖线贯穿各换乘段，比纯文字列表更有产品识别度，成本仍是纯 canvas 绘制，不加外部资源。
function buildShareCard() {
  const legs = route.legs;
  const W2 = 720, rowH = 64, trH = 34, padTop = 214, padBot = 90, DPR2 = 3, spineX = 48;
  let hgt = padTop;
  legs.forEach((g, i) => { if (i) hgt += trH; hgt += rowH; });
  hgt += padBot;
  const c = document.createElement("canvas");
  c.width = W2 * DPR2; c.height = hgt * DPR2;
  const cx = c.getContext("2d");
  cx.scale(DPR2, DPR2);
  cx.fillStyle = "#f4f1ea"; cx.fillRect(0, 0, W2, hgt);
  const FONT = `Bahnschrift, "Microsoft YaHei", sans-serif`;
  const mins = Math.round(route.mins);

  cx.fillStyle = "#98a1aa"; cx.font = `600 12px ${FONT}`;
  cx.fillText("SHANGHAI METRO · 换乘查询", 32, 34);
  cx.fillStyle = "#1d2126"; cx.font = `700 22px ${FONT}`;
  cx.fillText(`${selA} → ${selB}`, 32, 66);

  // 结论数字区：给"收图的人"一眼看到钩子，不是给查询者看过程
  cx.fillStyle = "rgba(30,35,40,0.045)";
  cx.beginPath(); cx.roundRect ? cx.roundRect(32, 84, W2 - 64, 96, 12) : cx.rect(32, 84, W2 - 64, 96);
  cx.fill();
  cx.fillStyle = "#1d2126"; cx.font = `800 44px ${FONT}`; cx.textBaseline = "alphabetic";
  cx.fillText(`${mins}`, 52, 152);
  const minsW = cx.measureText(`${mins}`).width;
  cx.font = `700 18px ${FONT}`; cx.fillText("分钟", 52 + minsW + 6, 152);
  cx.fillStyle = "#5c6670"; cx.font = `14px ${FONT}`;
  cx.fillText(`换乘 ${route.transfers.length} 次 · 共 ${route.stops} 站 · 约 ${route.km.toFixed(1)} km`, 52, 174);

  let y = padTop;
  legs.forEach((g, i) => {
    const L = lines[g.li];
    const rowTop = y;
    if (i) {
      cx.strokeStyle = lines[legs[i - 1].li].color; cx.lineWidth = 6; cx.lineCap = "round";
      cx.beginPath(); cx.moveTo(spineX, y - rowH * 0 ); cx.lineTo(spineX, y + trH); cx.stroke();
      cx.fillStyle = g.virt ? "#c2410c" : "#5c6670";
      cx.font = `600 13px ${FONT}`;
      cx.fillText(g.virt ? `⚠ 出站换乘 约${g.virt.min}分钟` : "站内换乘", spineX + 26, y + trH / 2 + 4);
      y += trH;
    }
    // 竖线脊柱：本段用本段线路色贯穿整行高度
    cx.strokeStyle = L.color; cx.lineWidth = 6; cx.lineCap = "round";
    cx.beginPath(); cx.moveTo(spineX, y); cx.lineTo(spineX, y + rowH); cx.stroke();
    // 节点：段起点画一个白底圈（换乘/起点标记），线路徽章贴在脊柱右侧
    cx.beginPath(); cx.arc(spineX, y, 7, 0, 7);
    cx.fillStyle = "#f4f1ea"; cx.fill(); cx.strokeStyle = L.color; cx.lineWidth = 3; cx.stroke();
    const bx = spineX + 30, by = y + rowH / 2 - 3, r = 18;
    cx.beginPath(); cx.arc(bx, by, r, 0, 7);
    cx.fillStyle = L.color; cx.fill();
    cx.fillStyle = darkText(L.color) ? "#101820" : "#fff";
    cx.font = `800 15px ${FONT}`; cx.textAlign = "center"; cx.textBaseline = "middle";
    cx.fillText(L.num, bx, by + 1);
    cx.textAlign = "left"; cx.textBaseline = "alphabetic";
    cx.fillStyle = "#1d2126"; cx.font = `700 16px ${FONT}`;
    cx.fillText(`${L.name}  ${g.from} → ${g.to}`, bx + 30, y + rowH / 2 - 2);
    cx.fillStyle = "#98a1aa"; cx.font = `12px ${FONT}`;
    cx.fillText(`${g.idx.length - 1} 站`, bx + 30, y + rowH / 2 + 17);
    if (i === legs.length - 1) { // 终点：脊柱末端加一个实心收尾点
      cx.beginPath(); cx.arc(spineX, y + rowH, 7, 0, 7);
      cx.fillStyle = L.color; cx.fill();
    }
    y += rowH;
  });

  cx.strokeStyle = "rgba(30,35,40,0.14)"; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(32, y + 14); cx.lineTo(W2 - 32, y + 14); cx.stroke();
  cx.fillStyle = "#98a1aa"; cx.font = `12px ${FONT}`;
  cx.fillText("shmetro3d.com", 32, y + 38);
  try {
    return c.toDataURL("image/png"); // 低端设备画布内存不足/受限环境可能抛错，交给调用方兜底
  } catch (e) {
    return null;
  }
}
const shareModal = document.getElementById("shareModal");
const shareImg = shareModal.querySelector("img");
const shareLoading = shareModal.querySelector(".share-loading");
const shareErrorEl = shareModal.querySelector(".share-error");
const shareHint = shareModal.querySelector(".share-hint");
function shareModalState(state) { // "loading" | "ready" | "error"
  shareLoading.hidden = state !== "loading";
  shareErrorEl.hidden = state !== "error";
  shareImg.hidden = state !== "ready";
  shareHint.hidden = state !== "ready";
}
function openShareCard() {
  shareModal.hidden = false;
  shareModalState("loading");
  // 注意：这里故意不用 requestAnimationFrame 延后生成——rAF 在页面被切到后台/不可见时
  // 会被浏览器整体挂起、永不触发（不同于 setTimeout 只是被节流），若用户切个后台再回来，
  // "生成中" 会卡死。canvas 绘制 + toDataURL 本身够快，直接同步做，可靠性优先于这点延迟。
  const url = buildShareCard();

function flyTo(pts) {
  let x0 = 1e9, x1 = -1e9, y0 = 1e9, y1 = -1e9;
  pts.forEach(p => {
    x0 = Math.min(x0, p[0]); x1 = Math.max(x1, p[0]);
    y0 = Math.min(y0, p[1]); y1 = Math.max(y1, p[1]);
  });
  const span = Math.max(x1 - x0, y1 - y0, 4);
  camGoal = { tx: (x0 + x1) / 2, ty: (y0 + y1) / 2,
    dist: Math.max(18, Math.min(180, span * 1.5 + 8)) };
}

const inA = document.getElementById("stA"), inB = document.getElementById("stB");

// —— 站名候选面板（替代 datalist：iOS 上 datalist 不过滤且触发页面缩放）——
const sugg = document.getElementById("sugg");
let sgInput = null;
const sgBadge = ln => {
  const L = lines[lineIdx.get(ln)];
  return `<span class="b" style="background:${L.color};color:${darkText(L.color) ? "#101820" : "#fff"}">${L.num}</span>`;
};
// 站名匹配：中文子串优先，其次拼音全拼/首字母（长站名/生僻字免打字场景）
function matchScore(s, q) {
  if (s.name.startsWith(q)) return 0;
  if (s.name.includes(q)) return 3;
  const py = PINYIN[s.name];
  if (!py) return -1;
  const [initials, full] = py.split("|");
  if (initials.startsWith(q)) return 1;
  if (full.startsWith(q)) return 2;
  if (initials.includes(q) || full.includes(q)) return 4;
  return -1;
}
function renderSugg() {
  const q = sgInput.value.trim();
  const ql = q.toLowerCase();
  const list = (q ? stations.map(s => [s, matchScore(s, ql)])
      .filter(([, sc]) => sc >= 0)
      .sort((a, b) => a[1] - b[1])
      .map(([s]) => s)
    : WHITELIST.map(n => stMap.get(n))).slice(0, 8);
  if (!list.length) { hideSugg(); return; }
  sugg.innerHTML = list.map(s =>
    `<button class="sg" role="option" data-n="${s.name}"><span class="nm">${s.name}</span>${s.lines.map(sgBadge).join("")}</button>`
  ).join("");
  const r = sgInput.getBoundingClientRect();
  const w = W <= 640 ? W - 20 : Math.max(r.width + 60, 230);
  sugg.style.width = w + "px";
  sugg.style.left = Math.max(10, Math.min(r.left, W - w - 10)) + "px";
  sugg.style.top = (r.bottom + 6) + "px";
  sugg.hidden = false;
}
function hideSugg() { sugg.hidden = true; }
sugg.addEventListener("pointerdown", e => {
  const b = e.target.closest(".sg");
  if (!b) return;
  e.preventDefault(); // 保持输入框焦点，避免 blur 先关掉面板
  sgInput.value = b.dataset.n;
  hideSugg();
  tryRoute();
  const other = sgInput === inA ? inB : inA;
  if (!stMap.has(other.value.trim())) other.focus();
  else sgInput.blur();
});
[inA, inB].forEach(el => {
  el.addEventListener("focus", () => {
    sgInput = el;
    // 已选站再次点入即清空重选；原值暂存，误触不输入则 blur 时恢复
    el.dataset.prev = el.value;
    if (stMap.has(el.value.trim())) el.value = "";
    renderSugg();
  });
  el.addEventListener("input", () => { sgInput = el; renderSugg(); });
  el.addEventListener("blur", () => {
    if (!el.value.trim() && el.dataset.prev) el.value = el.dataset.prev;
    setTimeout(() => {
      if (document.activeElement !== inA && document.activeElement !== inB) hideSugg();
    }, 120);
  });
  el.addEventListener("keydown", e => {
    if (e.key === "Escape") { hideSugg(); return; }
    if (e.key !== "Enter") return;
    const first = sugg.querySelector(".sg");
    if (!sugg.hidden && first && !stMap.has(el.value.trim())) el.value = first.dataset.n;
    hideSugg(); tryRoute(); el.blur();
  });
});

function tryRoute() {
  const a = inA.value.trim(), b = inB.value.trim();
  if (stMap.has(a)) selA = a; // 单独填了有效起点也先给图上反馈
  if (stMap.has(b)) selB = b;
  if (!stMap.has(a) || !stMap.has(b) || a === b) return;
  computeRoute();
}
inA.addEventListener("change", tryRoute);
inB.addEventListener("change", tryRoute);
document.getElementById("swapBtn").addEventListener("click", () => {
  [inA.value, inB.value] = [inB.value, inA.value];
  tryRoute();
});
document.getElementById("routeClear").addEventListener("click", clearRoute);

// —— 分享链接打开：URL #r=起点序号,终点序号 自动查询（短码；兼容旧版全名编码链接）——
{
  const m = location.hash.match(/^#r=([^,]+),(.+)$/);
  if (m) {
    let a, b;
    if (/^\d+$/.test(m[1]) && /^\d+$/.test(m[2])) { // 新版短码：车站序号
      a = stations[+m[1]]?.name; b = stations[+m[2]]?.name;
    } else { // 旧版链接兼容：完整站名 percent-encode
      a = decodeURIComponent(m[1]); b = decodeURIComponent(m[2]);
    }
    if (a && b && stMap.has(a) && stMap.has(b) && a !== b) {
      inA.value = a; inB.value = b; selA = a; selB = b; computeRoute();
    }
  }
}

// —— 悬停提示 ——
const tip = document.getElementById("tip");
const tipName = tip.querySelector(".tname"), tipLines = tip.querySelector(".tlines");
function hideTip() { tip.style.display = "none"; }
function showTip(s, x, y) {
  tipName.textContent = s.name;
  tipLines.textContent = s.lines.join(" · ");
  tip.style.display = "block";
  tip.style.left = Math.min(W - 220, x + 14) + "px";
  tip.style.top = Math.max(8, y - 40) + "px";
}

// —— 黑胶囊标注（Mini Metro 风）——
function drawPill(txt, x, y, bg = "rgba(29,33,38,0.92)", fg = "#fff") {
  const fs = W <= 640 ? 12.5 : 11.5;
  ctx.font = `700 ${fs}px Bahnschrift, "Microsoft YaHei", sans-serif`;
  const h = fs + 11, w = ctx.measureText(txt).width + 18;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - w / 2, y - h / 2, w, h, h / 2);
  else ctx.rect(x - w / 2, y - h / 2, w, h);
  ctx.fillStyle = bg; ctx.fill();
  ctx.fillStyle = fg; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(txt, x, y + 0.5);
  ctx.textBaseline = "alphabetic";
  return w;
}

// —— 渲染 ——
let t0 = performance.now(), clock = 0;
function frame(now) {
  const dt = Math.min(0.05, (now - t0) / 1000); t0 = now;
  clock += dt * TRAIN_SPEED;
  if (camGoal) { // 相机平滑飞向查询路径
    const k = Math.min(1, dt * 2.5);
    cam.tx += (camGoal.tx - cam.tx) * k;
    cam.ty += (camGoal.ty - cam.ty) * k;
    cam.dist += (camGoal.dist - cam.dist) * k;
    if (Math.abs(camGoal.dist - cam.dist) < 0.2 &&
        Math.hypot(camGoal.tx - cam.tx, camGoal.ty - cam.ty) < 0.2) camGoal = null;
  }
  updateProj();

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // 地面网格（路径模式下背景整体减淡，突出查询结果）
  const bgDim = route ? 0.45 : 1;
  const lw = Math.max(2.6, Math.min(16, PR.F / cam.dist * 0.3)); // 线路粗细随缩放
  ctx.lineWidth = 1;
  ctx.strokeStyle = `rgba(30,35,40,${0.05 * bgDim})`;
  ctx.beginPath();
  for (let gx = -50; gx <= 50; gx += 5) {
    let m = proj(gx, -42, 0); ctx.moveTo(m[0], m[1]);
    m = proj(gx, 32, 0); ctx.lineTo(m[0], m[1]);
  }
  for (let gy = -42; gy <= 32; gy += 5) {
    let m = proj(-50, gy, 0); ctx.moveTo(m[0], m[1]);
    m = proj(50, gy, 0); ctx.lineTo(m[0], m[1]);
  }
  ctx.stroke();

  // 黄浦江
  ctx.lineJoin = "round"; ctx.lineCap = "round";
  ctx.beginPath();
  RIVER.forEach((p, i) => {
    const m = proj(p[0], p[1], 0);
    i ? ctx.lineTo(m[0], m[1]) : ctx.moveTo(m[0], m[1]);
  });
  ctx.strokeStyle = `rgba(150,200,230,${0.5 * bgDim})`;
  ctx.lineWidth = Math.max(8, 1.3 * PR.F / cam.dist);
  ctx.stroke();

  // 线路（单遍粗圆线条，官方色实色）
  const alphaOf = i => route ? 0.10 : (selected === -1 || selected === i) ? 1 : 0.12;
  lines.forEach((L, i) => {
    const P = L.pts.map(p => proj(p[0], p[1], 0));
    ctx.beginPath();
    for (let j = 0; j < P.length; j++) {
      // 顶点偏移 = 相邻两段（槽位×屏幕法线）的平均：共线段并排成双轨，普通段为零
      let ox = 0, oy = 0, c = 0;
      for (const s of [j - 1, j]) {
        if (s < 0 || s >= L.slot.length) continue;
        c++;
        if (!L.slot[s]) continue;
        const dx = P[s + 1][0] - P[s][0], dy = P[s + 1][1] - P[s][1];
        const d = Math.hypot(dx, dy) || 1;
        ox += (-dy / d) * L.slot[s]; oy += (dx / d) * L.slot[s];
      }
      const k = c ? lw * 1.15 / c : 0;
      j ? ctx.lineTo(P[j][0] + ox * k, P[j][1] + oy * k)
        : ctx.moveTo(P[j][0] + ox * k, P[j][1] + oy * k);
    }
    ctx.globalAlpha = alphaOf(i);
    ctx.strokeStyle = L.color;
    ctx.lineWidth = selected === i ? lw * 1.3 : lw;
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // 车站（普通站：白芯 + 线路色圈；换乘站：白芯 + 深色圈）
  const picks = [];
  lines.forEach((L, i) => {
    const a = alphaOf(i);
    if (a < 0.5 || lw < 4) return; // 全网视野下不画普通站，放大后才浮现
    ctx.globalAlpha = a;
    L.st.forEach(s => {
      if (stMap.get(s[3]).hub) return;
      const p = toKm(s[0], s[1]);
      const m = proj(p[0], p[1], 0);
      const r = Math.max(1.5, lw * 0.38);
      ctx.beginPath(); ctx.arc(m[0], m[1], r, 0, 7);
      ctx.fillStyle = "#ffffff"; ctx.fill();
      ctx.strokeStyle = L.color; ctx.lineWidth = Math.max(1, r * 0.55); ctx.stroke();
    });
  });
  ctx.globalAlpha = 1;
  stations.forEach(s => {
    const vis = route ? false : (selected === -1 || s.lines.includes(lines[selected].name));
    const m = proj(s.x, s.y, 0);
    if (s.hub && vis) {
      const r = Math.max(2.6, lw * 0.62);
      ctx.beginPath(); ctx.arc(m[0], m[1], r, 0, 7);
      ctx.fillStyle = "#ffffff"; ctx.fill();
      ctx.strokeStyle = "#1d2126"; ctx.lineWidth = Math.max(1.4, r * 0.42); ctx.stroke();
    }
    if (vis) picks.push({ s, x: m[0], y: m[1] });
  });

  // 列车（深色圆点沿线滑行；手机端全静态不绘制）
  if (W > 640 && TRAIN_SPEED > 0) {
    trains.forEach(tr => {
      const L = lines[tr.li];
      const a = alphaOf(tr.li);
      if (a < 0.5) return;
      let s;
      if (L.ring) {
        s = (clock * 2.3 + tr.phase) % L.len;
      } else {
        const u = (clock * 2.3 + tr.phase) % (2 * L.len);
        s = u < L.len ? u : 2 * L.len - u;
      }
      const h = pointAt(L, s);
      const m = proj(h[0], h[1], 0.06);
      ctx.globalAlpha = 0.9 * a;
      ctx.beginPath(); ctx.arc(m[0], m[1], Math.max(2.2, lw * 0.4), 0, 7);
      ctx.fillStyle = "#1d2126"; ctx.fill();
      ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1; ctx.stroke();
    });
    ctx.globalAlpha = 1;
  }

  // 查询路径高亮
  if (route) {
    ctx.lineJoin = "round"; ctx.lineCap = "round";
    route.legs.forEach(g => {
      const L = lines[g.li];
      ctx.beginPath();
      g.pts.forEach((p, j) => {
        const m = proj(p[0], p[1], 0);
        j ? ctx.lineTo(m[0], m[1]) : ctx.moveTo(m[0], m[1]);
      });
      ctx.globalAlpha = 0.30; ctx.strokeStyle = L.color; ctx.lineWidth = lw * 2.6; ctx.stroke();
      ctx.globalAlpha = 1; ctx.lineWidth = lw * 1.35; ctx.stroke();
    });
    // 沿途车站
    route.legs.forEach(g => {
      g.pts.forEach((p, j) => {
        const m = proj(p[0], p[1], 0);
        ctx.beginPath(); ctx.arc(m[0], m[1], Math.max(1.8, lw * 0.4), 0, 7);
        ctx.fillStyle = "#ffffff"; ctx.fill();
        ctx.strokeStyle = "#1d2126"; ctx.lineWidth = 1; ctx.stroke();
        picks.push({ s: stMap.get(stName(g.li, g.idx[j])), x: m[0], y: m[1] });
      });
    });
    // 换乘站：常亮圈（扩散波纹仅电脑端，手机端全静态）
    route.legs.slice(1).forEach(g => {
      const p = g.pts[0], m = proj(p[0], p[1], 0);
      const base = Math.max(7, m[2] * 0.3);
      ctx.strokeStyle = lines[g.li].color;
      ctx.globalAlpha = 0.95; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(m[0], m[1], base, 0, 7); ctx.stroke();
      if (W > 640) {
        const ph = (now * 0.0016) % 1;
        ctx.globalAlpha = 0.7 * (1 - ph); ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(m[0], m[1], base + ph * 18, 0, 7); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    });
    // 光点沿路径行进（仅电脑端）
    if (route.len > 0 && W > 640) {
      const sPos = (clock * 2.6) % route.len;
      for (let k = 5; k >= 0; k--) {
        const q = pointAt(route, sPos - k * 0.5);
        const m = proj(q[0], q[1], 0.08);
        ctx.globalAlpha = k ? 0.16 * (1 - k / 6) : 1;
        ctx.fillStyle = "#1d2126";
        ctx.beginPath(); ctx.arc(m[0], m[1], k ? 2.6 : 3, 0, 7); ctx.fill();
        if (!k) { ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1.2; ctx.stroke(); }
      }
      ctx.globalAlpha = 1;
    }
    // 起终点 + 换乘标注（胶囊）
    const mark = (name, txt, col) => { // 起终点：立杆 + 胶囊
      const st = stMap.get(name);
      const g0 = proj(st.x, st.y, 0), h0 = proj(st.x, st.y, 2.8);
      ctx.strokeStyle = "rgba(29,33,38,0.35)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(g0[0], g0[1]); ctx.lineTo(h0[0], h0[1]); ctx.stroke();
      drawPill(txt, h0[0], h0[1] - 12, col);
    };
    mark(selA, "▲ " + selA, "#0a8f43");
    mark(selB, "▼ " + selB, "#d7301f");
    // 换乘胶囊放光环下方，不与顶部标注抢位；出站换乘橙色警示
    route.legs.slice(1).forEach(g => {
      const m = proj(g.pts[0][0], g.pts[0][1], 0);
      const base = Math.max(7, m[2] * 0.3);
      if (g.virt) drawPill(`⚠ ${g.from} 出站换乘${lines[g.li].name}`, m[0], m[1] + base + 18, "#c2410c");
      else drawPill(`⇋ ${g.from} 换乘${lines[g.li].name}`, m[0], m[1] + base + 18);
    });
  } else if (selA && stMap.has(selA)) {
    // 已选起点、待选终点：绿色圈反馈（波纹仅电脑端）
    const st = stMap.get(selA);
    const g0 = proj(st.x, st.y, 0), h0 = proj(st.x, st.y, 2.8);
    ctx.strokeStyle = "#0a8f43";
    ctx.globalAlpha = 0.95; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(g0[0], g0[1], 6, 0, 7); ctx.stroke();
    if (W > 640) {
      const ph = (now * 0.0016) % 1;
      ctx.globalAlpha = 0.7 * (1 - ph); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(g0[0], g0[1], 6 + ph * 16, 0, 7); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.strokeStyle = "rgba(29,33,38,0.35)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(g0[0], g0[1]); ctx.lineTo(h0[0], h0[1]); ctx.stroke();
    drawPill("▲ " + selA + " · 再点终点站", h0[0], h0[1] - 12, "#0a8f43");
  }

  // 地名标注（立杆 + 黑胶囊）：白名单常显，枢纽/起终点/普通站随缩放分层浮现
  const tierMax = cam.dist < 20 ? 4 : cam.dist < 28 ? 3 : cam.dist < 45 ? 2
    : cam.dist < 70 ? 1 : 0;
  const placed = []; // 按优先级避让，重叠只画先者
  if (!route && selA && stMap.has(selA)) { // 起点绿色胶囊先占位，地名让开
    const h = proj(stMap.get(selA).x, stMap.get(selA).y, 2.8);
    placed.push({ x: h[0], y: h[1] - 12, w: 170 });
  }
  LBL.forEach(s => {
    if (route) return; // 路径模式下只显示路径自己的标注
    if (s.tier > tierMax) return;
    if (s.name === selA) return; // 已被选为起点，绿色胶囊接管
    if (selected !== -1 && !s.lines.includes(lines[selected].name)) return;
    const g = proj(s.x, s.y, 0), h = proj(s.x, s.y, 2.4);
    const lx = h[0], ly = h[1] - 10;
    if (lx < -80 || lx > W + 80 || ly < -20 || ly > H + 20) return;
    if (placed.some(p => Math.abs(p.x - lx) < (p.w + 96) / 2 && Math.abs(p.y - ly) < 24)) return;
    ctx.strokeStyle = "rgba(29,33,38,0.3)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(g[0], g[1]); ctx.lineTo(h[0], h[1]); ctx.stroke();
    const w = drawPill(s.name, lx, ly);
    placed.push({ x: lx, y: ly, w });
  });
  if (!route && tierMax >= 4) { // 放大到街区级：普通站直接标小字
    ctx.font = `${W <= 640 ? 12 : 11}px Bahnschrift, "Microsoft YaHei", sans-serif`;
    ctx.fillStyle = "#4a525b"; ctx.textAlign = "center";
    stations.forEach(s => {
      if (s.tier < 4 || s.name === selA) return;
      if (selected !== -1 && !s.lines.includes(lines[selected].name)) return;
      const m = proj(s.x, s.y, 0);
      if (m[0] < -40 || m[0] > W + 40 || m[1] < -20 || m[1] > H + 20) return;
      const ly = m[1] + lw * 0.38 + 13;
      const w = ctx.measureText(s.name).width;
      if (placed.some(p => Math.abs(p.x - m[0]) < (p.w + w) / 2 + 8 && Math.abs(p.y - ly) < 18)) return;
      ctx.fillText(s.name, m[0], ly);
      placed.push({ x: m[0], y: ly, w });
    });
  }

  // 悬停命中
  if (hoverPt && pointers.size === 0) {
    let best = null, bd = 169;
    for (const p of picks) {
      const d = (p.x - hoverPt.x) ** 2 + (p.y - hoverPt.y) ** 2;
      if (d < bd) { bd = d; best = p; }
    }
    best ? showTip(best.s, best.x, best.y) : hideTip();
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
